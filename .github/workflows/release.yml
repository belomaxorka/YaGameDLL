name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  windows:
    name: 'Windows'
    runs-on: windows-2025

    env:
      solution: 'msvc/ReGameDLL.sln'
      buildPlatform: 'Win32'
      buildRelease: 'Release'
      buildReleasePlay: 'Release Play'
      buildTests: 'Tests'
      toolset: 'v143'

    steps:
      - name: Configure
        run: git config --global --add safe.directory "$GITHUB_WORKSPACE"

      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup MSBuild
        uses: microsoft/setup-msbuild@v2

      - name: Build and Run unittests
        run: |
          msbuild ${{ env.solution }} -p:Configuration="${{ env.buildTests }}" /t:Clean,Build /p:Platform=${{ env.buildPlatform }} /p:PlatformToolset=${{ env.toolset }} /p:XPDeprecationWarning=false
          .\"msvc\Tests\mp.exe"
          If ($LASTEXITCODE -ne 0 -And
          $LASTEXITCODE -ne 3)
          {[Environment]::Exit(1)}
        shell: "pwsh"

      - name: Build
        run: |
          msbuild ${{ env.solution }} -p:Configuration="${{ env.buildRelease }}" /t:Clean,Build /p:Platform=${{ env.buildPlatform }} /p:PlatformToolset=${{ env.toolset }} /p:XPDeprecationWarning=false
          msbuild ${{ env.solution }} -p:Configuration="${{ env.buildReleasePlay }}" /t:Clean,Build /p:Platform=${{ env.buildPlatform }} /p:PlatformToolset=${{ env.toolset }} /p:XPDeprecationWarning=false

      - name: Get rcedit from chocolatey
        shell: pwsh
        run: |
          choco install rcedit -y

      - name: Move files
        run: |
          mkdir publish\debug
          mkdir publish\tests
          mkdir publish\bin\win32\cstrike\dlls
          move "msvc\${{ env.buildReleasePlay }}\mp.dll" publish\tests\mp.dll
          move msvc\${{ env.buildRelease }}\mp.dll publish\bin\win32\cstrike\dlls\mp.dll
          move msvc\${{ env.buildRelease }}\mp.pdb publish\debug\mp.pdb

      - name: Get app version
        id: get_version
        shell: pwsh
        run: |
          $versionFile = "regamedll/version/appversion.h"
          if (-not (Test-Path $versionFile)) {
            Write-Error "Version file not found: $versionFile"
            exit 1
          }

          $content = Get-Content $versionFile
          foreach ($line in $content) {
            if ($line -match '^\s*#define\s+APP_VERSION\s+"([^"]+)"') {
              $version = $matches[1]
              "version=$version" >> $env:GITHUB_OUTPUT
              Write-Host "Found version: $version"
              exit 0
            }
          }
          Write-Error "APP_VERSION not found in file"
          exit 1

      - name: Edit resources at windows binaries
        run: |
          rcedit ${{ github.workspace }}\publish\bin\win32\cstrike\dlls\mp.dll --set-version-string ProductName "ReGameDLL_CS - mp.dll" --set-file-version "${{ steps.get_version.outputs.version }}" --set-product-version "${{ steps.get_version.outputs.version }}" --set-version-string FileDescription "ReGameDLL_CS (mp.dll) fork build, Commit: $env:GITHUB_SHA" --set-version-string CompanyName "ReHLDS Dev Team" --set-version-string LegalCopyright "Copyright 2025 Valve, ReHLDS DevTeam" --set-icon regamedll/msvc/icon.ico
        shell: "pwsh"

      - name: Deploy artifacts
        uses: actions/upload-artifact@v4
        with:
          name: win32
          path: publish/*

  testdemos:
    name: 'Test demos'
    runs-on: ubuntu-latest
    container: rehldsorg/testdemos:latest
    needs: [windows]

    defaults:
      run:
        shell: bash
        working-directory: /opt/HLDS

    strategy:
      fail-fast: false
      matrix:
        test: [
          { file: 'cstrike-basic-1',    desc: 'CS: Testing jumping, scenarios, shooting etc' },
        ]

    steps:
      - name: Deploying windows artifacts
        uses: actions/download-artifact@v4
        with:
          name: win32

      - name: Setup dependencies
        run: |
          chown root ~
          rsync -a deps/regamedll/* .
          mv $GITHUB_WORKSPACE/tests/mp.dll cstrike/dlls/mp.dll

      - name: Play test
        env:
          demo: ${{ matrix.test.file }}
          desc: ${{ matrix.test.desc }}
        run: ./runTest.sh

  linux:
    name: 'Linux'
    runs-on: ubuntu-latest
    container: debian:11-slim

    steps:
      - name: Install dependencies
        run: |
          dpkg --add-architecture i386
          apt-get update -o Acquire::Retries=3
          apt-get install -y -o Acquire::Retries=3 \
            gcc-multilib g++-multilib \
            build-essential \
            libc6-dev libc6-dev-i386 \
            git cmake rsync \
            g++ gcc

      - name: Configure
        run: git config --global --add safe.directory "$GITHUB_WORKSPACE"

      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 0

      - name: Build and Run unittests
        run: |
          rm -rf build && CC=gcc CXX=g++ cmake -DCMAKE_BUILD_TYPE=Unittests -B build && cmake --build build -j8
          retVal=0
          ./build/regamedll/cs 2> /dev/null > result.log || retVal=$?
          while read line; do
            if [[ ${line} == *"Warning in test"* ]] ; then
              echo -e "\e[2;38m$line"
            elif [[ ${line} == *"Failure in test"* ]] ; then
              echo -e "\e[1;31m$line"
            else
              echo -e "\e[0;33m$line"
            fi
          done <<< $(cat result.log)

          if [ $retVal -ne 0 ] && [ $retVal -ne 3 ]; then
            echo -e "\e[30;41mExit code: $retVal\e[0m"
            exit 1 # Unittest failed
          else
            echo -e "\e[30;43mExit code: $retVal\e[0m"
          fi
        shell: bash

      - name: Build using GCC Compiler
        run: |
          rm -rf build && CC=gcc CXX=g++ cmake -B build && cmake --build build -j8

      - name: Prepare CSSDK
        run: |
          mkdir -p publish/cssdk
          rsync -a regamedll/extra/cssdk/ publish/cssdk/ --exclude=.git --exclude=LICENSE --exclude=README.md

      - name: Move files
        run: |
          mkdir -p publish/bin/linux32/cstrike/dlls
          mv build/regamedll/cs.so publish/bin/linux32/cstrike/dlls/cs.so 2>/dev/null || true
          mv regamedll/version/appversion.h publish/appversion.h
          mv dist/ publish/

      - name: Run GLIBC/ABI version compat test
        run: |
          binaries=(
            "publish/bin/linux32/cstrike/dlls/cs.so"
          )
          bash ./regamedll/version/glibc_test.sh ${binaries[@]}
          if [[ $? -ne 0 ]]; then
            exit 1 # Assertion failed
          fi
        shell: bash

      - name: Deploy artifacts
        uses: actions/upload-artifact@v4
        with:
          name: linux32
          path: publish/*

  publish:
    name: 'Publish'
    runs-on: ubuntu-latest
    needs: [windows, testdemos, linux]
    if: github.ref_type == 'tag'

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          path: src
          fetch-depth: 0

      - name: Deploying linux artifacts
        uses: actions/download-artifact@v4
        with:
          name: linux32
          path: linux32

      - name: Deploying windows artifacts
        uses: actions/download-artifact@v4
        with:
          name: win32
          path: win32

      - name: Reading appversion.h
        run: |
          APP_VERSION=$(grep -wi '#define APP_VERSION' linux32/appversion.h | head -n1 | sed -e 's/#define APP_VERSION[ \t\r\n\v\f]\+"\(.*\)"/\1/i' -e 's/\r//g' | xargs)
          if [ -z "$APP_VERSION" ]; then
            APP_VERSION="unknown"
          fi
          echo "APP_VERSION=${APP_VERSION}" >> $GITHUB_ENV

      - name: Packaging binaries
        run: |
          mkdir -p pack
          rsync -a win32/bin pack/
          rsync -a linux32/bin pack/
          rsync -a linux32/cssdk pack/
          rsync -a linux32/dist/ pack/bin/win32/cstrike/
          rsync -a linux32/dist/ pack/bin/linux32/cstrike/
          cd pack
          7z a -tzip ../yagamedll-${APP_VERSION}.zip bin/ cssdk/

      - name: Generate changelog
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          cd src
          BASE=$(git merge-base origin/master HEAD)
          BASE_SHORT=$(git rev-parse --short $BASE)

          # Upstream-equivalent version of the base commit: rehlds numbers its
          # builds as MAJOR.MINOR.MAINTENANCE.<commit count>, reproduce it here
          VERSION_FILE=regamedll/version/version.h
          MAJOR=$(grep -wi 'VERSION_MAJOR' $VERSION_FILE | grep -o '[0-9]\+' | head -n1)
          MINOR=$(grep -wi 'VERSION_MINOR' $VERSION_FILE | grep -o '[0-9]\+' | head -n1)
          MAINT=$(grep -wi 'VERSION_MAINTENANCE' $VERSION_FILE | grep -o '[0-9]\+' | head -n1)
          BASE_COUNT=$(git rev-list --count $BASE)
          UPSTREAM_VERSION="${MAJOR}.${MINOR}.${MAINT}.${BASE_COUNT}"

          # Link to the upstream diff since the previous release (its base
          # commit is parsed from the "Upstream base:" line of its notes)
          UPSTREAM_DIFF=
          PREV_JSON=$(gh api "repos/${{ github.repository }}/releases?per_page=1" 2>/dev/null || echo '[]')
          PREV_TAG=$(echo "$PREV_JSON" | jq -r '.[0].tag_name // empty')
          # \[\? tolerates both the plain `hash` and the linked [`hash`](url) format
          PREV_BASE=$(echo "$PREV_JSON" | jq -r '.[0].body // empty' | sed -n 's/.*Upstream base:.*commit \[\?`\([0-9a-f]*\)`.*/\1/p' | head -n1)
          if [ -n "$PREV_BASE" ] && [ "$PREV_BASE" != "$BASE_SHORT" ]; then
            UPSTREAM_DIFF="Upstream changes since \`${PREV_TAG}\`: https://github.com/rehlds/ReGameDLL_CS/compare/${PREV_BASE}...${BASE_SHORT}"
          fi

          # Changelog covers only commits since the previous release. The release
          # branch is force-pushed, so --cherry-pick drops rewritten but
          # patch-identical commits; amended ones legitimately reappear. First
          # release (or a deleted previous tag) falls back to all fork commits.
          RANGE="origin/master..HEAD"
          CHERRY=""
          FULL_DIFF=""
          if [ -n "$PREV_TAG" ] && git rev-parse -q --verify "refs/tags/${PREV_TAG}" >/dev/null; then
            RANGE="${PREV_TAG}...HEAD"
            CHERRY="--cherry-pick --right-only"
            FULL_DIFF="**Full changelog**: https://github.com/${{ github.repository }}/compare/${PREV_TAG}...${{ github.ref_name }}"
          fi
          CHANGELOG=$(git log --no-merges $CHERRY --pretty='- %s [`%h`](https://github.com/${{ github.repository }}/commit/%H)' $RANGE)

          {
            echo "YaGameDLL — Yet Another GameDLL, a ReGameDLL_CS fork. Build \`${APP_VERSION}\` (commit [\`${GITHUB_SHA::7}\`](https://github.com/${{ github.repository }}/commit/${GITHUB_SHA}))."
            echo
            echo "Upstream base: [rehlds/ReGameDLL_CS](https://github.com/rehlds/ReGameDLL_CS) \`${UPSTREAM_VERSION}\` — commit $(git log -1 --format='[`%h`](https://github.com/rehlds/ReGameDLL_CS/commit/%H) %s (%ad)' --date=short $BASE)."
            if [ -n "$UPSTREAM_DIFF" ]; then
              echo
              echo "$UPSTREAM_DIFF"
            fi
            echo
            echo "---"
            echo
            echo "### Changelog"
            if [ -n "$CHANGELOG" ]; then
              echo "$CHANGELOG"
            else
              echo "_No fork-side changes since \`${PREV_TAG}\`._"
            fi
            if [ -n "$FULL_DIFF" ]; then
              echo
              echo "$FULL_DIFF"
            fi
          } > ../changelog.md
          cat ../changelog.md

      - name: Publish release for tag
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "${{ github.ref_name }}" yagamedll-*.zip \
            -R ${{ github.repository }} \
            --title "YaGameDLL ${APP_VERSION}" \
            --notes-file changelog.md \
            --latest
